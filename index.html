<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<style>
    body {
        background-color: #e9e6f3;
        
    }
</style>
<body>


<input type="text" placeholder="Enter first no" id="ip1">
<input type="text" placeholder="Enter second no" id="ip2">
<button onclick="add()">Add</button>
<p id="result"></p>



</body>

<script>
    const SPLUNK_URL   = 'https://prd-p-wb8kq.splunkcloud.com:8088/services/collector/event';
    const SPLUNK_TOKEN = '36c8fa8b-29b0-4bc8-8759-d9b96577dd82';

    function logToSplunk(action, details = {}) {
        fetch(SPLUNK_URL, {
            method:  'POST',
            headers: { 'Authorization': `Splunk ${SPLUNK_TOKEN}` },
            body:    JSON.stringify({
                sourcetype: 'calculator_app',
                event: { action, ...details, timestamp: new Date().toISOString() }
            }),
        }).catch(() => {});
    }

    function add() {
      let v1 = parseInt(document.getElementById("ip1").value)
      let v2 = parseInt(document.getElementById("ip2").value)
      document.getElementById("result").innerText = v1+v2;
      console.log("addition is :", v1+v2)
      logToSplunk('calculation_performed', { v1, v2, result: v1+v2 });
    }

    logToSplunk('app_loaded');
</script>
</html>
